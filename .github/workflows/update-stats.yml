name: Update Profile Assets

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GodProfile MCP
        run: pip install godprofile-mcp -q

      - name: Regenerate SVG assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SPOTIFY_ACCESS_TOKEN: ${{ secrets.SPOTIFY_ACCESS_TOKEN }}
        run: python generate_assets.py

      - name: Commit updated assets
        run: |
          git config user.name  "profile-bot"
          git config user.email "actions@github.com"
          git add header/
          git diff --cached --quiet || git commit -m "chore: auto-update profile assets [skip ci]"
          git push
