      <stop offset="0%" style="stop-color:#151922;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f131a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bgGrad2)" />
  <rect x="1" y="1" width="798" height="198" fill="none" stroke="#2b303a" stroke-width="1" rx="8"/>

  <!-- Icon -->
  <g transform="translate(60, 50)">
