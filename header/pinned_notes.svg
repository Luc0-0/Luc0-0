    <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#8f98a8" stroke-width="1" rx="1"/>
    <circle cx="-5" cy="-3" r="2" fill="#8f98a8"/>
    <circle cx="5" cy="-3" r="2" fill="#8f98a8"/>
  </g>

  <!-- Content -->
  <text x="120" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#eceff4">Smart Notes</text>
