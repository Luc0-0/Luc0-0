<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#151c25"/>
    </linearGradient>
    <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b6a891" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b6a891" stop-opacity="0"/>
    </radialGradient>
    <style>
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .title    { opacity: 0; animation: fadein 0.8s 0.2s ease forwards; }
    .subtitle { opacity: 0; animation: fadein 0.8s 0.7s ease forwards; }
    .uline    { opacity: 0; animation: fadein 0.5s 1.1s ease forwards; }
    .logo-core { animation: pulse 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="800" height="160" fill="url(#bg-grad)" rx="10"/>

  <!-- Logo glow halo -->
  <circle cx="80" cy="80" r="48" fill="url(#logo-glow)"/>
  <!-- Logo orbit ring -->
  <circle cx="80" cy="80" r="28" fill="none" stroke="#b6a891" stroke-width="0.75" opacity="0.2"/>
  <!-- Logo spokes -->
  <line x1="80" y1="80" x2="108.0" y2="80.0" stroke="#b6a891" stroke-width="1" opacity="0.35"/><line x1="80" y1="80" x2="94.0" y2="104.2" stroke="#b6a891" stroke-width="1" opacity="0.35"/><line x1="80" y1="80" x2="66.0" y2="104.2" stroke="#b6a891" stroke-width="1" opacity="0.35"/><line x1="80" y1="80" x2="52.0" y2="80.0" stroke="#b6a891" stroke-width="1" opacity="0.35"/><line x1="80" y1="80" x2="66.0" y2="55.8" stroke="#b6a891" stroke-width="1" opacity="0.35"/><line x1="80" y1="80" x2="94.0" y2="55.8" stroke="#b6a891" stroke-width="1" opacity="0.35"/>
  <!-- Logo orbital dots -->
  <circle cx="108.0" cy="80.0" r="3" fill="#b6a891" opacity="0.6"/><circle cx="94.0" cy="104.2" r="3" fill="#b6a891" opacity="0.6"/><circle cx="66.0" cy="104.2" r="3" fill="#b6a891" opacity="0.6"/><circle cx="52.0" cy="80.0" r="3" fill="#b6a891" opacity="0.6"/><circle cx="66.0" cy="55.8" r="3" fill="#b6a891" opacity="0.6"/><circle cx="94.0" cy="55.8" r="3" fill="#b6a891" opacity="0.6"/>
  <!-- Logo core node -->
  <circle cx="80" cy="80" r="7" fill="#b6a891" class="logo-core"/>
  <circle cx="80" cy="80" r="3" fill="#0b0f14"/>

  <!-- Title -->
  <text x="130" y="66" dominant-baseline="middle"
        fill="#eceff4" font-family="Segoe UI, Inter, sans-serif"
        font-size="38" font-weight="bold" class="title">Nipun Sujesh</text>

  <!-- Accent underline -->
  <rect x="130" y="84" width="168" height="2.5" fill="#b6a891" rx="1.5" class="uline"/>

  <!-- Subtitle -->
  <text x="130" y="112" dominant-baseline="middle"
        fill="#b6a891" font-family="Consolas, monospace"
        font-size="14" opacity="0.8" class="subtitle">AI/ML · Full-Stack · Research-Driven</text>
</svg>