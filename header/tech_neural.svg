<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f14" />
      <stop offset="100%" stop-color="#151c25" />
    </linearGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M14 0 H0 V14" fill="none" stroke="#1b222c" stroke-width="0.6" />
    </pattern>
    <style>
      .mono-label { font-family: Consolas, monospace; font-size: 9px; fill: #8f98a8; letter-spacing: 2px; text-transform: uppercase; }
      .cat { font-family: Consolas, monospace; font-size: 8px; fill: #4c566a; letter-spacing: 2px; text-transform: uppercase; }
      .tech-group .tech { font-family: Consolas, monospace; font-size: 11px; fill: #a8b1bf; letter-spacing: 0.5px; transition: all 0.3s ease; }
      .tech-group .bullet { fill: transparent; stroke: #2f3642; stroke-width: 1.2; transition: all 0.3s ease; }
      .tech-group:hover .tech { fill: #b6a891; font-weight: bold; }
      .tech-group:hover .bullet { fill: #b6a891; stroke: #b6a891; }
      .col-line { stroke: #21262d; stroke-width: 0.6; }
    </style>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <rect width="800" height="200" fill="url(#grid)" opacity="0.2" rx="12"/>
  <rect x="1" y="1" width="798" height="198" rx="12" fill="none" stroke="#2b303a" stroke-width="1"/>

  <rect x="2" y="40" width="3" height="120" fill="#b6a891" rx="1" opacity="0.5"/>

  <text x="24" y="26" class="mono-label">Technical Arsenal</text>
  <line x1="24" y1="33" x2="776" y2="33" stroke="#21262d" stroke-width="0.6"/>

  <!-- Column 1: AI / ML -->
  <text x="60" y="54" class="cat">AI · ML</text>
  <g class="tech-group"><rect x="44" y="68" width="4" height="4" class="bullet"/><text x="60" y="74" class="tech">Python</text></g>
  <g class="tech-group"><rect x="44" y="86" width="4" height="4" class="bullet"/><text x="60" y="92" class="tech">PyTorch</text></g>
  <g class="tech-group"><rect x="44" y="104" width="4" height="4" class="bullet"/><text x="60" y="110" class="tech">TensorFlow</text></g>
  <g class="tech-group"><rect x="44" y="122" width="4" height="4" class="bullet"/><text x="60" y="128" class="tech">HuggingFace</text></g>
  <g class="tech-group"><rect x="44" y="140" width="4" height="4" class="bullet"/><text x="60" y="146" class="tech">XLNet / BERT</text></g>
  <g class="tech-group"><rect x="44" y="158" width="4" height="4" class="bullet"/><text x="60" y="164" class="tech">Scikit-learn</text></g>

  <line x1="210" y1="44" x2="210" y2="180" class="col-line"/>

  <!-- Column 2: Backend -->
  <text x="250" y="54" class="cat">Backend</text>
  <g class="tech-group"><rect x="234" y="68" width="4" height="4" class="bullet"/><text x="250" y="74" class="tech">FastAPI</text></g>
  <g class="tech-group"><rect x="234" y="86" width="4" height="4" class="bullet"/><text x="250" y="92" class="tech">Node.js</text></g>
  <g class="tech-group"><rect x="234" y="104" width="4" height="4" class="bullet"/><text x="250" y="110" class="tech">PostgreSQL</text></g>
  <g class="tech-group"><rect x="234" y="122" width="4" height="4" class="bullet"/><text x="250" y="128" class="tech">MongoDB</text></g>
  <g class="tech-group"><rect x="234" y="140" width="4" height="4" class="bullet"/><text x="250" y="146" class="tech">REST APIs</text></g>
  <g class="tech-group"><rect x="234" y="158" width="4" height="4" class="bullet"/><text x="250" y="164" class="tech">WebSockets</text></g>

  <line x1="410" y1="44" x2="410" y2="180" class="col-line"/>

  <!-- Column 3: Frontend -->
  <text x="450" y="54" class="cat">Frontend</text>
  <g class="tech-group"><rect x="434" y="68" width="4" height="4" class="bullet"/><text x="450" y="74" class="tech">React</text></g>
  <g class="tech-group"><rect x="434" y="86" width="4" height="4" class="bullet"/><text x="450" y="92" class="tech">TypeScript</text></g>
  <g class="tech-group"><rect x="434" y="104" width="4" height="4" class="bullet"/><text x="450" y="110" class="tech">Next.js</text></g>
  <g class="tech-group"><rect x="434" y="122" width="4" height="4" class="bullet"/><text x="450" y="128" class="tech">Tailwind</text></g>
  <g class="tech-group"><rect x="434" y="140" width="4" height="4" class="bullet"/><text x="450" y="146" class="tech">Framer Motion</text></g>

  <line x1="600" y1="44" x2="600" y2="180" class="col-line"/>

  <!-- Column 4: Cloud / DevOps -->
  <text x="640" y="54" class="cat">Cloud · Ops</text>
  <g class="tech-group"><rect x="624" y="68" width="4" height="4" class="bullet"/><text x="640" y="74" class="tech">Azure</text></g>
  <g class="tech-group"><rect x="624" y="86" width="4" height="4" class="bullet"/><text x="640" y="92" class="tech">Docker</text></g>
  <g class="tech-group"><rect x="624" y="104" width="4" height="4" class="bullet"/><text x="640" y="110" class="tech">Git / GitHub</text></g>
  <g class="tech-group"><rect x="624" y="122" width="4" height="4" class="bullet"/><text x="640" y="128" class="tech">CI / CD</text></g>
  <g class="tech-group"><rect x="624" y="140" width="4" height="4" class="bullet"/><text x="640" y="146" class="tech">Linux</text></g>

  <!-- bottom rule -->
  <line x1="24" y1="182" x2="776" y2="182" stroke="#21262d" stroke-width="0.6"/>
  <text x="24" y="196" class="cat" style="letter-spacing:1px; opacity:0.4;">END-TO-END  ·  RESEARCH TO PRODUCTION</text>
</svg>