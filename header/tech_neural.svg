<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f14" />
      <stop offset="100%" stop-color="#151c25" />
    </linearGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M14 0 H0 V14" fill="none" stroke="#1b222c" stroke-width="0.6" />
    </pattern>
    <style>
      .mono-label { font-family: Consolas, monospace; font-size: 10px; fill: #8f98a8; letter-spacing: 3px; text-transform: uppercase; }
      .tech { font-family: Consolas, monospace; font-size: 11px; fill: #eceff4; letter-spacing: 0.5px; transition: all 0.3s ease; }
      .node-core { fill: #b6a891; transition: all 0.3s ease; }
      .node-ring { fill: none; stroke: #2f3642; stroke-width: 1; transition: all 0.3s ease; }
      .edge { fill: none; stroke: #2f3642; stroke-width: 1.2; opacity: 0.5; }
      
      .node-group { cursor: pointer; }
      .node-group:hover .tech { fill: #b6a891; font-weight: bold; }
      .node-group:hover .node-core { fill: #eceff4; filter: drop-shadow(0 0 4px #eceff4); }
      .node-group:hover .node-ring { stroke: #b6a891; stroke-width: 1.5; r: 16; }
    </style>
  </defs>

  <rect width="800" height="280" fill="url(#bg)" rx="12"/>
  <rect width="800" height="280" fill="url(#grid)" opacity="0.2" rx="12"/>
  <rect x="1" y="1" width="798" height="278" rx="12" fill="none" stroke="#2b303a" stroke-width="1"/>
  <rect x="2" y="30" width="3" height="220" fill="#b6a891" rx="1" opacity="0.5"/>

  <text x="24" y="26" class="mono-label">Technical Arsenal Neural Map</text>

  <!-- EDGES (Curved Data Paths) -->
  
  <!-- Frontend to Core -->
  <path d="M100 60 C100 100, 130 100, 130 140" class="edge"/> <!-- TS to React -->
  <path d="M100 220 C100 180, 130 180, 130 140" class="edge"/> <!-- Next.js to React -->
  <path d="M180 200 C155 200, 155 140, 130 140" class="edge"/> <!-- Tailwind to React -->
  
  <path d="M130 140 C180 140, 270 80, 320 80" class="edge"/> <!-- React to Node -->
  <path d="M130 140 C200 140, 250 140, 320 140" class="edge"/> <!-- React to FastAPI -->
  <path d="M320 200 C320 170, 320 170, 320 140" class="edge"/> <!-- REST APIs to FastAPI -->
  
  <!-- Backend to Data Cloud -->
  <path d="M320 80 C400 80, 400 60, 500 60" class="edge"/> <!-- Node to Postgres -->
  <path d="M320 140 C400 140, 400 60, 500 60" class="edge"/> <!-- FastAPI to Postgres -->
  <path d="M320 140 C400 140, 400 110, 500 110" class="edge"/> <!-- FastAPI to MongoDB -->
  <path d="M320 140 C400 140, 400 180, 500 180" class="edge"/> <!-- FastAPI to Docker -->
  <path d="M500 180 C500 205, 500 205, 500 230" class="edge"/> <!-- Docker to Azure -->
  
  <!-- AI/ML to API Backbone -->
  <path d="M640 140 C550 140, 410 140, 320 140" class="edge" stroke-width="1.5" opacity="0.7"/> <!-- Python to FastAPI Core Spine -->
  
  <!-- ML Cluster -->
  <path d="M640 140 C670 140, 670 70, 700 70" class="edge"/> <!-- Python to PyTorch -->
  <path d="M640 140 C670 140, 670 120, 700 120" class="edge"/> <!-- Python to TensorFlow -->
  <path d="M700 70 C730 70, 730 110, 760 110" class="edge"/> <!-- PyTorch to HuggingFace -->
  <path d="M700 120 C730 120, 730 110, 760 110" class="edge"/> <!-- TensorFlow to HuggingFace -->
  <path d="M700 70 C730 70, 730 170, 760 170" class="edge"/> <!-- PyTorch to XLNet -->

  <!-- ANIMATED PULSES -->
  <circle r="2" fill="#eceff4" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M130 140 C200 140, 250 140, 320 140"/>
  </circle>
  <circle r="2" fill="#eceff4" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M320 140 C400 140, 400 60, 500 60"/>
  </circle>
  <circle r="2" fill="#eceff4" opacity="0.8">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M320 140 C400 140, 400 180, 500 180"/>
  </circle>
  <circle r="2.5" fill="#b6a891" opacity="0.9" filter="drop-shadow(0 0 4px #b6a891)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M640 140 C550 140, 410 140, 320 140"/>
  </circle>
  <circle r="2" fill="#b6a891" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M640 140 C670 140, 670 70, 700 70"/>
  </circle>

  <!-- NODES -->
  <!-- Frontend -->
  <g class="node-group">
    <circle cx="100" cy="60" r="14" class="node-ring"/><circle cx="100" cy="60" r="3" class="node-core"/>
    <text x="100" y="40" text-anchor="middle" class="tech">TypeScript</text>
  </g>
  <g class="node-group">
    <circle cx="130" cy="140" r="18" class="node-ring"/><circle cx="130" cy="140" r="5" class="node-core"/>
    <text x="130" y="172" text-anchor="middle" class="tech">React</text>
  </g>
  <g class="node-group">
    <circle cx="100" cy="220" r="14" class="node-ring"/><circle cx="100" cy="220" r="3" class="node-core"/>
    <text x="100" y="245" text-anchor="middle" class="tech">Next.js</text>
  </g>
  <g class="node-group">
    <circle cx="180" cy="200" r="14" class="node-ring"/><circle cx="180" cy="200" r="3" class="node-core"/>
    <text x="180" y="225" text-anchor="middle" class="tech">Tailwind</text>
  </g>

  <!-- Gateway / Backend -->
  <g class="node-group">
    <circle cx="320" cy="80" r="14" class="node-ring"/><circle cx="320" cy="80" r="3" class="node-core"/>
    <text x="320" y="55" text-anchor="middle" class="tech">Node.js</text>
  </g>
  <g class="node-group">
    <circle cx="320" cy="140" r="18" class="node-ring"/><circle cx="320" cy="140" r="6" class="node-core" fill="#eceff4"/>
    <text x="320" y="175" text-anchor="middle" class="tech">FastAPI</text>
  </g>
  <g class="node-group">
    <circle cx="320" cy="200" r="14" class="node-ring"/><circle cx="320" cy="200" r="3" class="node-core"/>
    <text x="320" y="225" text-anchor="middle" class="tech">REST APIs</text>
  </g>

  <!-- Data / Cloud -->
  <g class="node-group">
    <circle cx="500" cy="60" r="16" class="node-ring"/><circle cx="500" cy="60" r="4" class="node-core"/>
    <text x="500" y="35" text-anchor="middle" class="tech">PostgreSQL</text>
  </g>
  <g class="node-group">
    <circle cx="500" cy="110" r="14" class="node-ring"/><circle cx="500" cy="110" r="3" class="node-core"/>
    <text x="500" y="135" text-anchor="middle" class="tech">MongoDB</text>
  </g>
  <g class="node-group">
    <circle cx="500" cy="180" r="14" class="node-ring"/><circle cx="500" cy="180" r="4" class="node-core"/>
    <text x="500" y="155" text-anchor="middle" class="tech">Docker</text>
  </g>
  <g class="node-group">
    <circle cx="500" cy="230" r="14" class="node-ring"/><circle cx="500" cy="230" r="3" class="node-core"/>
    <text x="500" y="255" text-anchor="middle" class="tech">Azure</text>
  </g>

  <!-- AI / ML Core -->
  <g class="node-group">
    <circle cx="640" cy="140" r="18" class="node-ring"/><circle cx="640" cy="140" r="6" class="node-core" fill="#eceff4"/>
    <text x="640" y="172" text-anchor="middle" class="tech">Python</text>
  </g>
  <g class="node-group">
    <circle cx="700" cy="70" r="16" class="node-ring"/><circle cx="700" cy="70" r="4" class="node-core"/>
    <text x="700" y="45" text-anchor="middle" class="tech">PyTorch</text>
  </g>
  <g class="node-group">
    <circle cx="700" cy="120" r="14" class="node-ring"/><circle cx="700" cy="120" r="3" class="node-core"/>
    <text x="700" y="98" text-anchor="middle" class="tech">TensorFlow</text>
  </g>
  <g class="node-group">
    <circle cx="760" cy="110" r="16" class="node-ring"/><circle cx="760" cy="110" r="4" class="node-core"/>
    <text x="770" y="85" text-anchor="middle" class="tech">HuggingFace</text>
  </g>
  <g class="node-group">
    <circle cx="760" cy="170" r="14" class="node-ring"/><circle cx="760" cy="170" r="3" class="node-core"/>
    <text x="760" y="195" text-anchor="middle" class="tech">XLNet / BERT</text>
  </g>

  <!-- Label Groups -->
  <text x="110" y="270" text-anchor="middle" class="mono-label" style="opacity:0.3;">FRONTEND</text>
  <text x="320" y="270" text-anchor="middle" class="mono-label" style="opacity:0.3;">GATEWAY / API</text>
  <text x="500" y="270" text-anchor="middle" class="mono-label" style="opacity:0.3;">DATA / CLOUD</text>
  <text x="700" y="270" text-anchor="middle" class="mono-label" style="opacity:0.3;">AI &amp; ML CORE</text>
</svg>