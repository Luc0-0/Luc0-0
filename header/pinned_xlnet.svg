<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradXL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#151922;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f131a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bgGradXL)" />
  <rect x="1" y="1" width="798" height="198" fill="none" stroke="#2b303a" stroke-width="1" rx="8"/>

  <g transform="translate(60, 50)">
    <path d="M -11 -10 L 0 0 L 11 -10" fill="none" stroke="#b6a891" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M -11 10 L 0 0 L 11 10" fill="none" stroke="#8f98a8" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#8f98a8"/>
  </g>

  <text x="120" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#eceff4">XLNet Emotion Classifier</text>
  <text x="120" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9aa4b4">Transformer-based NLP research for emotion understanding</text>

  <g id="tech-pills-xl">
    <rect x="120" y="100" width="68" height="22" rx="4" fill="#1c2230" stroke="#2f3642" stroke-width="0.7"/>
    <text x="130" y="115" font-family="monospace" font-size="11" fill="#a8b1bf">Python</text>

    <rect x="198" y="100" width="65" height="22" rx="4" fill="#1c2230" stroke="#2f3642" stroke-width="0.7"/>
    <text x="206" y="115" font-family="monospace" font-size="11" fill="#a8b1bf">XLNet</text>

    <rect x="273" y="100" width="97" height="22" rx="4" fill="#1c2230" stroke="#2f3642" stroke-width="0.7"/>
    <text x="282" y="115" font-family="monospace" font-size="11" fill="#a8b1bf">Transformers</text>
  </g>

  <g id="stats-xl">
    <text x="620" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#eceff4">Research-Grade NLP</text>
    <text x="620" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9aa4b4">Fine-tuned classification pipeline</text>

    <line x1="620" y1="85" x2="760" y2="85" stroke="#2b303a" stroke-width="0.7"/>

    <text x="620" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#b6a891">• Multi-class emotion labels</text>
    <text x="620" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8f98a8">• Evaluation-first workflow</text>
