<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#151922;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f131a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bgGrad)" />
  <rect x="1" y="1" width="798" height="198" fill="none" stroke="#2b303a" stroke-width="1" rx="8"/>

  <!-- Icon minimalist -->
  <circle cx="60" cy="50" r="22" fill="none" stroke="#b6a891" stroke-width="1.4"/>
  <circle cx="60" cy="50" r="18" fill="none" stroke="#8f98a8" stroke-width="1"/>
  <line x1="60" y1="32" x2="60" y2="68" stroke="#8f98a8" stroke-width="1.4"/>
  <line x1="42" y1="50" x2="78" y2="50" stroke="#8f98a8" stroke-width="1.4"/>

  <!-- Content -->
  <text x="120" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#eceff4">Serenity</text>
  
  <text x="120" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9aa4b4">Capstone Project · Multi-modal Mental Health Assistant</text>
  
  <!-- Tags/Stack -->
  <g id="tech-pills">
    <rect x="120" y="100" width="70" height="22" rx="4" fill="#1c2230" stroke="#2f3642" stroke-width="0.7"/>
    <text x="130" y="115" font-family="monospace" font-size="11" fill="#a8b1bf">Python</text>
    
    <rect x="200" y="100" width="65" height="22" rx="4" fill="#1c2230" stroke="#2f3642" stroke-width="0.7"/>
    <text x="208" y="115" font-family="monospace" font-size="11" fill="#a8b1bf">PyTorch</text>
    
    <rect x="275" y="100" width="60" height="22" rx="4" fill="#1c2230" stroke="#2f3642" stroke-width="0.7"/>
    <text x="285" y="115" font-family="monospace" font-size="11" fill="#a8b1bf">Docker</text>
  </g>

  <!-- Stats right side -->
  <g id="stats">
    <text x="620" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#eceff4">Local LLM</text>
    <text x="620" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9aa4b4">Ollama Integration</text>
    
    <line x1="620" y1="85" x2="760" y2="85" stroke="#2b303a" stroke-width="0.7"/>
    
    <text x="620" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#b6a891">• Capstone Scope</text>
    <text x="620" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8f98a8">• Production-Ready Architecture</text>
  </g>
</svg>