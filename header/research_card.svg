<svg xmlns="http://www.w3.org/2000/svg" width="800" height="140" viewBox="0 0 800 140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f14" />
      <stop offset="100%" stop-color="#151c25" />
    </linearGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M14 0 H0 V14" fill="none" stroke="#1b222c" stroke-width="0.6" />
    </pattern>
    <style>
      .mono-small { font-family: Consolas, monospace; font-size: 9px; fill: #8f98a8; letter-spacing: 2px; text-transform: uppercase; }
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #eceff4; }
      .body { font-family: Consolas, monospace; font-size: 10.5px; fill: #8b949e; letter-spacing: 0.3px; }
      .tag-text { font-family: Consolas, monospace; font-size: 9px; fill: #a8b1bf; }
    </style>
  </defs>

  <rect width="800" height="140" fill="url(#bg)" rx="12"/>
  <rect width="800" height="140" fill="url(#grid)" opacity="0.2" rx="12"/>
  <rect x="1" y="1" width="798" height="138" rx="12" fill="none" stroke="#2b303a" stroke-width="1"/>

  <!-- Left gold accent bar -->
  <rect x="2" y="30" width="3" height="80" fill="#b6a891" rx="1" opacity="0.8"/>

  <!-- top label -->
  <text x="24" y="28" class="mono-small">Current Research  ·  2025</text>

  <!-- divider -->
  <line x1="24" y1="36" x2="776" y2="36" stroke="#21262d" stroke-width="0.6"/>

  <!-- title -->
  <text x="24" y="66" class="title">Emotion-Aware NLP</text>
  <text x="24" y="88" class="body">Developing transformer pipelines that detect and respond to emotional context in text.</text>
  <text x="24" y="103" class="body">XLNet-based architecture with custom affect layers. Focus: valence-arousal modelling.</text>

  <!-- tags -->
  <g>
    <rect x="24" y="114" width="60" height="18" rx="4" fill="#161d27" stroke="#2f3642" stroke-width="0.7"/>
    <text x="35" y="126" class="tag-text">XLNet</text>

    <rect x="92" y="114" width="46" height="18" rx="4" fill="#161d27" stroke="#2f3642" stroke-width="0.7"/>
    <text x="103" y="126" class="tag-text">NLP</text>

    <rect x="146" y="114" width="94" height="18" rx="4" fill="#161d27" stroke="#2f3642" stroke-width="0.7"/>
    <text x="156" y="126" class="tag-text">Deep Learning</text>

    <rect x="248" y="114" width="118" height="18" rx="4" fill="#161d27" stroke="#2f3642" stroke-width="0.7"/>
    <text x="258" y="126" class="tag-text">Affect Computing</text>
  </g>

  <!-- status indicator -->
  <circle cx="752" cy="72" r="1.5" fill="#eceff4"/>
  <circle cx="752" cy="72" r="4" fill="#b6a891" opacity="0.5">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="752" y="94" text-anchor="middle" class="mono-small" style="font-size:8px; opacity:0.8; fill:#b6a891;">ACTIVE</text>
  <!-- Optional HUD lines mapping to the dot -->
  <path d="M680 72 L735 72 L745 62 L752 62" fill="none" stroke="#21262d" stroke-width="0.6"/>
</svg>